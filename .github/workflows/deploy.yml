name: Deploy to S3

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::168723764897:role/github-actions-iam-access-atlas
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync . s3://clover-documentation/iamaccessatlas/ \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "*.py" \
            --exclude "README.md" \
            --exclude "CLAUDE.md" \
            --exclude "ROADMAP.md"
